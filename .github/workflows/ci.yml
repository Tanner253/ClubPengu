# Club Pengu CI/CD Pipeline
# Runs tests on every push and PR, blocks deployment on test failures

name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '18'
  CLIENT_DIR: waddlebet
  SERVER_DIR: waddlebet/server

jobs:
  # ==================== CLIENT TESTS ====================
  test-client:
    name: Client Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.CLIENT_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.CLIENT_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run client tests
        run: npm test

      - name: Generate client coverage
        run: npm run test:coverage
        continue-on-error: true

      - name: Upload client coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./${{ env.CLIENT_DIR }}/coverage/lcov.info
          flags: client
          name: client-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ==================== SERVER TESTS ====================
  test-server:
    name: Server Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.SERVER_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.SERVER_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run server tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-for-ci

      - name: Generate server coverage
        run: npm run test:coverage
        continue-on-error: true

      - name: Upload server coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./${{ env.SERVER_DIR }}/coverage/lcov.info
          flags: server
          name: server-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ==================== LINT CHECK ====================
  lint:
    name: Lint Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.CLIENT_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.CLIENT_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

  # ==================== BUILD CHECK ====================
  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [test-client, test-server]

    defaults:
      run:
        working-directory: ${{ env.CLIENT_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.CLIENT_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ${{ env.CLIENT_DIR }}/dist/
          retention-days: 7

  # ==================== DEPLOYMENT GATE ====================
  deploy-gate:
    name: Deployment Gate
    runs-on: ubuntu-latest
    needs: [test-client, test-server, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deployment Check
        run: |
          echo "✅ All tests passed!"
          echo "✅ Build successful!"
          echo "🚀 Ready for deployment to production"
          echo ""
          echo "Summary:"
          echo "  - Client tests: PASSED"
          echo "  - Server tests: PASSED"
          echo "  - Build: PASSED"
